<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>C++ 第08课：结构体与类 - 视频课</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #101319;
      --panel: #171b23;
      --panel-2: #202634;
      --text: #f4f7fb;
      --muted: #a9b2c3;
      --accent: #58a6ff;
      --green: #7ee787;
      --yellow: #f2cc60;
      --border: #30384a;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: "Microsoft YaHei", "Segoe UI", Arial, sans-serif;
    }

    .app {
      display: grid;
      grid-template-rows: auto 1fr auto;
      min-height: 100vh;
    }

    header {
      padding: 20px 28px;
      border-bottom: 1px solid var(--border);
      background: #0f141d;
    }

    h1 {
      margin: 0;
      font-size: 26px;
      font-weight: 700;
      letter-spacing: 0;
    }

    .subtitle {
      margin-top: 8px;
      color: var(--muted);
      font-size: 15px;
    }

    main {
      display: grid;
      grid-template-columns: minmax(360px, 0.9fr) minmax(520px, 1.2fr);
      gap: 18px;
      padding: 18px;
      min-height: 0;
    }

    .stage, .code-panel {
      border: 1px solid var(--border);
      background: var(--panel);
      border-radius: 8px;
      overflow: hidden;
      min-height: 0;
    }

    .stage {
      display: grid;
      grid-template-rows: 220px 1fr;
    }

    .visual {
      position: relative;
      display: grid;
      place-items: center;
      overflow: hidden;
      background:
        radial-gradient(circle at 20% 20%, rgba(88, 166, 255, 0.16), transparent 34%),
        linear-gradient(135deg, #151c28, #0e1219);
    }

    .diagram {
      width: 86%;
      max-width: 560px;
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      gap: 14px;
    }

    .box {
      min-height: 88px;
      border: 1px solid #3c465c;
      background: rgba(32, 38, 52, 0.92);
      border-radius: 8px;
      padding: 14px;
    }

    .box strong {
      display: block;
      margin-bottom: 8px;
      color: var(--green);
      font-size: 18px;
    }

    .arrow {
      color: var(--accent);
      font-size: 30px;
      font-weight: 700;
    }

    .script {
      padding: 22px;
      display: grid;
      align-content: start;
      gap: 18px;
    }

    .chapter {
      color: var(--accent);
      font-size: 14px;
      font-weight: 700;
    }

    .line {
      font-size: 26px;
      line-height: 1.55;
      font-weight: 700;
    }

    .note {
      color: var(--muted);
      font-size: 16px;
      line-height: 1.8;
    }

    .points {
      display: grid;
      gap: 10px;
    }

    .point {
      border-left: 3px solid var(--accent);
      background: var(--panel-2);
      padding: 10px 12px;
      border-radius: 6px;
      color: #dce6f5;
    }

    .code-panel {
      display: grid;
      grid-template-rows: auto 1fr;
    }

    .code-title {
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
      color: var(--muted);
      display: flex;
      justify-content: space-between;
      gap: 12px;
    }

    pre {
      margin: 0;
      padding: 18px;
      overflow: auto;
      font-family: Consolas, "Cascadia Code", monospace;
      font-size: 15px;
      line-height: 1.6;
      white-space: pre;
    }

    .code-line {
      display: block;
      min-height: 24px;
      padding: 0 8px;
      border-radius: 4px;
    }

    .code-line.active {
      background: rgba(88, 166, 255, 0.18);
      outline: 1px solid rgba(88, 166, 255, 0.38);
    }

    .kw { color: #ff7b72; }
    .type { color: #79c0ff; }
    .str { color: #a5d6ff; }
    .com { color: #8b949e; }
    .fn { color: #d2a8ff; }

    footer {
      padding: 14px 18px 18px;
      border-top: 1px solid var(--border);
      background: #0f141d;
      display: grid;
      gap: 12px;
    }

    .controls {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    button {
      border: 1px solid #3c465c;
      background: var(--panel-2);
      color: var(--text);
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 15px;
      cursor: pointer;
    }

    button:hover { border-color: var(--accent); }

    .bar {
      flex: 1;
      height: 10px;
      background: #242b3a;
      border-radius: 999px;
      overflow: hidden;
      cursor: pointer;
    }

    .fill {
      width: 0;
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--green));
    }

    .time {
      width: 96px;
      color: var(--muted);
      text-align: right;
      font-variant-numeric: tabular-nums;
    }

    .timeline {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding-bottom: 2px;
    }

    .chip {
      flex: 0 0 auto;
      border: 1px solid var(--border);
      background: #141a24;
      color: var(--muted);
      border-radius: 999px;
      padding: 7px 10px;
      font-size: 13px;
      cursor: pointer;
    }

    .chip.active {
      color: var(--text);
      border-color: var(--accent);
      background: rgba(88, 166, 255, 0.16);
    }

    @media (max-width: 920px) {
      main { grid-template-columns: 1fr; }
      .stage { grid-template-rows: 190px auto; }
      .line { font-size: 22px; }
    }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <h1>C++ 第08课：结构体与类</h1>
      <div class="subtitle">像视频一样播放：理解对象、类、构造函数和成员函数</div>
    </header>

    <main>
      <section class="stage">
        <div class="visual">
          <div class="diagram">
            <div class="box">
              <strong id="leftTitle">散乱变量</strong>
              <div id="leftBody">name / age / score</div>
            </div>
            <div class="arrow">→</div>
            <div class="box">
              <strong id="rightTitle">对象</strong>
              <div id="rightBody">Student s</div>
            </div>
          </div>
        </div>
        <div class="script">
          <div class="chapter" id="chapter">00:00 课程目标</div>
          <div class="line" id="speech">这一课，我们从“变量和函数”进入“对象”的世界。</div>
          <div class="note" id="note">结构体和类让你可以自己创造类型，这是 C++ 面向对象编程的入口。</div>
          <div class="points" id="points"></div>
        </div>
      </section>

      <section class="code-panel">
        <div class="code-title">
          <span>C++课程 / 第08课_结构体与类 / Examples / main.cpp</span>
          <span id="focusLine">重点：整体结构</span>
        </div>
        <pre id="code"></pre>
      </section>
    </main>

    <footer>
      <div class="controls">
        <button id="play">播放</button>
        <button id="prev">上一段</button>
        <button id="next">下一段</button>
        <div class="bar" id="bar"><div class="fill" id="fill"></div></div>
        <div class="time" id="time">00:00</div>
      </div>
      <div class="timeline" id="timeline"></div>
    </footer>
  </div>

  <script>
    const codeLines = [
      ['// 包含输入输出功能。', 'com'],
      ['#include "../../common/Utf8Console.h"', 'kw'],
      ['#include <iostream>', 'kw'],
      ['// 引入字符串类型。', 'com'],
      ['#include <string>', 'kw'],
      ['// 简化标准库名称。', 'com'],
      ['using namespace std;', 'kw'],
      ['', ''],
      ['// 定义一个学生类。', 'com'],
      ['class Student {', 'kw'],
      ['public:', 'kw'],
      ['    string name;', 'type'],
      ['    int age;', 'type'],
      ['', ''],
      ['    Student(string n, int a) : name(n), age(a) {}', 'fn'],
      ['', ''],
      ['    void introduce() {', 'fn'],
      ['        cout << "我是" << name << "，今年" << age << "岁" << endl;', 'str'],
      ['    }', ''],
      ['};', ''],
      ['', ''],
      ['int main() {', 'fn'],
      ['    Student s("Tom", 18);', 'type'],
      ['    s.introduce();', 'fn'],
      ['    return 0;', 'kw'],
      ['}', '']
    ];

    const scenes = [
      {
        t: 0, title: '00:00 课程目标', line: '这一课，我们从“变量和函数”进入“对象”的世界。',
        note: '结构体和类让你可以自己创造类型，这是 C++ 面向对象编程的入口。',
        focus: [9, 20], left: ['变量 + 函数', '散在不同地方'], right: ['对象', '数据 + 行为'],
        points: ['类是一种自定义类型', '对象是这个类型创建出来的具体东西', '本课为封装、继承、多态做准备']
      },
      {
        t: 8, title: '00:08 为什么需要类', line: '如果一个学生有姓名和年龄，我们不希望这些数据散得到处都是。',
        note: '类可以把同一类事物的数据放进一个结构里，让程序更容易组织。',
        focus: [9, 13], left: ['name / age', '两个散变量'], right: ['Student', '一个学生类型'],
        points: ['把相关数据打包', '提高代码可读性', '让后续功能更容易扩展']
      },
      {
        t: 17, title: '00:17 class Student', line: 'class Student 表示：我们正在定义一种新的类型，名字叫 Student。',
        note: '以后 Student 可以像 int、string 一样用来声明变量，只不过它是我们自己定义的类型。',
        focus: [9, 10], left: ['class', '定义类型'], right: ['Student', '新类型名称'],
        points: ['class 后面跟类型名', '大括号里写这个类型拥有什么', '分号不能忘']
      },
      {
        t: 27, title: '00:27 public 区域', line: 'public 表示公开区域，外面的代码可以访问这里的成员。',
        note: '如果成员是 public，就可以通过对象点号访问，比如 s.name。',
        focus: [10, 13], left: ['public', '外部可访问'], right: ['name / age', '对象属性'],
        points: ['public 是访问权限', 'name 和 age 是成员变量', '成员变量也叫对象的属性']
      },
      {
        t: 38, title: '00:38 构造函数', line: '构造函数会在对象创建时自动执行，用来初始化对象。',
        note: 'Student(string n, int a) 和类名 Student 一样，所以它是构造函数。',
        focus: [14, 15], left: ['参数', 'n / a'], right: ['成员', 'name / age'],
        points: ['构造函数名字和类名一样', '没有返回值', '初始化列表写在冒号后面']
      },
      {
        t: 52, title: '00:52 成员函数', line: 'introduce 是成员函数，它描述学生对象能做什么。',
        note: '成员函数可以直接访问同一个对象里的 name 和 age。',
        focus: [16, 19], left: ['属性', 'name / age'], right: ['行为', 'introduce()'],
        points: ['成员函数属于类', '函数内部能访问成员变量', '对象不只有数据，也有行为']
      },
      {
        t: 66, title: '01:06 创建对象', line: 'Student s("Tom", 18) 创建了一个具体学生对象。',
        note: '这里的 s 就是对象，Tom 和 18 会传给构造函数。',
        focus: [21, 24], left: ['Student', '类型'], right: ['s', '对象'],
        points: ['类型是模板，对象是实例', '创建对象时自动调用构造函数', 's 里保存了 name 和 age']
      },
      {
        t: 80, title: '01:20 调用方法', line: 's.introduce() 表示调用对象 s 的成员函数。',
        note: '点号表示“访问这个对象里面的成员”。',
        focus: [23, 24], left: ['s', '对象'], right: ['introduce()', '对象的方法'],
        points: ['点号访问对象成员', '成员函数操作对象内部数据', '调试时可以进入这个函数观察执行过程']
      },
      {
        t: 94, title: '01:34 本课总结', line: '类把属性和行为放在一起，对象就是类创建出来的具体东西。',
        note: '学会这一课，你就真正开始进入 C++ 面向对象编程了。',
        focus: [9, 24], left: ['类', '设计图'], right: ['对象', '真正使用的实例'],
        points: ['类 = 属性 + 行为', '对象 = 类创建出来的实例', '构造函数负责初始化对象']
      }
    ];

    const total = 105;
    let current = 0;
    let playing = false;
    let timer = null;

    const codeEl = document.getElementById('code');
    const chapterEl = document.getElementById('chapter');
    const speechEl = document.getElementById('speech');
    const noteEl = document.getElementById('note');
    const pointsEl = document.getElementById('points');
    const fillEl = document.getElementById('fill');
    const timeEl = document.getElementById('time');
    const playBtn = document.getElementById('play');
    const focusLineEl = document.getElementById('focusLine');
    const timelineEl = document.getElementById('timeline');

    function renderCode(activeRange) {
      codeEl.innerHTML = '';
      codeLines.forEach((line, index) => {
        const row = document.createElement('span');
        row.className = 'code-line';
        if (index + 1 >= activeRange[0] && index + 1 <= activeRange[1]) row.classList.add('active');
        const no = String(index + 1).padStart(2, '0');
        row.innerHTML = `<span class="com">${no}  </span><span class="${line[1]}">${escapeHtml(line[0]) || ' '}</span>`;
        codeEl.appendChild(row);
      });
    }

    function escapeHtml(text) {
      return text.replace(/[&<>"]/g, ch => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[ch]));
    }

    function sceneAt(time) {
      return scenes.reduce((last, scene) => time >= scene.t ? scene : last, scenes[0]);
    }

    function render() {
      const scene = sceneAt(current);
      chapterEl.textContent = scene.title;
      speechEl.textContent = scene.line;
      noteEl.textContent = scene.note;
      document.getElementById('leftTitle').textContent = scene.left[0];
      document.getElementById('leftBody').textContent = scene.left[1];
      document.getElementById('rightTitle').textContent = scene.right[0];
      document.getElementById('rightBody').textContent = scene.right[1];
      focusLineEl.textContent = `重点：第 ${scene.focus[0]}-${scene.focus[1]} 行`;
      pointsEl.innerHTML = '';
      scene.points.forEach(text => {
        const item = document.createElement('div');
        item.className = 'point';
        item.textContent = text;
        pointsEl.appendChild(item);
      });
      renderCode(scene.focus);
      fillEl.style.width = `${Math.min(100, current / total * 100)}%`;
      const minute = Math.floor(current / 60);
      const second = Math.floor(current % 60);
      timeEl.textContent = `${String(minute).padStart(2, '0')}:${String(second).padStart(2, '0')}`;
      document.querySelectorAll('.chip').forEach((chip, index) => {
        chip.classList.toggle('active', scenes[index] === scene);
      });
    }

    function play() {
      playing = !playing;
      playBtn.textContent = playing ? '暂停' : '播放';
      if (playing) {
        timer = setInterval(() => {
          current += 1;
          if (current >= total) {
            current = total;
            playing = false;
            playBtn.textContent = '重播';
            clearInterval(timer);
          }
          render();
        }, 1000);
      } else {
        clearInterval(timer);
      }
    }

    scenes.forEach((scene, index) => {
      const chip = document.createElement('button');
      chip.className = 'chip';
      chip.textContent = scene.title;
      chip.addEventListener('click', () => {
        current = scene.t;
        render();
      });
      timelineEl.appendChild(chip);
    });

    document.getElementById('play').addEventListener('click', () => {
      if (current >= total) current = 0;
      play();
    });
    document.getElementById('prev').addEventListener('click', () => {
      const previous = [...scenes].reverse().find(scene => scene.t < current - 1) || scenes[0];
      current = previous.t;
      render();
    });
    document.getElementById('next').addEventListener('click', () => {
      const next = scenes.find(scene => scene.t > current) || scenes[scenes.length - 1];
      current = next.t;
      render();
    });
    document.getElementById('bar').addEventListener('click', event => {
      const rect = event.currentTarget.getBoundingClientRect();
      current = Math.round((event.clientX - rect.left) / rect.width * total);
      render();
    });

    render();
  </script>
</body>
</html>
